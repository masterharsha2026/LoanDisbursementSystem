<section class="login-shell">
	<div class="login-card">
		<h1>Loan Disbursement Portal</h1>
		<p>Sign in to manage loans and disbursements.</p>

		<form (ngSubmit)="onLogin()" #loginForm="ngForm" class="login-form">
			<label>
				Username
				<input
					type="text"
					name="userName"
					required
					[(ngModel)]="credentials.userName"
				/>
			</label>

			<label>
				Password
				<input
					type="password"
					name="password"
					required
					[(ngModel)]="credentials.password"
				/>
			</label>

			<button type="submit" [disabled]="loading || loginForm.invalid">
				{{ loading ? 'Signing in...' : 'Sign In' }}
			</button>

			<p class="error" *ngIf="errorMessage">{{ errorMessage }}</p>
		</form>
	</div>
</section>
